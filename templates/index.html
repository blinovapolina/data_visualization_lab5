<!DOCTYPE html>
<html>

<head>
    <title>Анализ успеваемости студентов</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f7f7f7;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        p {
            font-size: 1.1em;
            color: #555;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            font-size: 1.1em;
            color: white;
            background-color: #28a745;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #1e7e34;
        }

        .btn-data {
            background-color: #007BFF;
        }

        .btn-data:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <h1>Анализ успеваемости студентов</h1>
    <p>Исследование факторов, влияющих на академическую успеваемость студентов</p>
    <div class="btn-container">
        <a class="btn btn-data" href="/data/">Исходные данные</a>
        <a class="btn" href="/dashboard/">Аналитика данных</a>
    </div>
</body>

</html>
